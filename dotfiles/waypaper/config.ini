[Settings]
language = fr
folder = ~/Images/wallpapers
wallpaper = __HOME__/Images/wallpapers/animated/mylivewallpapers-com-Sakamoto-Days-Osaragi-4K.mp4
backend = mpvpaper
monitors = All
fill = fill
sort = name
color = #111111
subfolders = True
all_subfolders = True
show_hidden = False
show_gifs_only = False
show_path_in_tooltip = True
number_of_columns = 4
use_xdg_state = False
zen_mode = False
mpvpaper_sound = True
mpvpaper_options = --mute=yes --hwdec=auto-safe --profile=fast --cache=no --demuxer-max-bytes=32MiB --demuxer-max-back-bytes=8MiB --demuxer-readahead-secs=1 --vd-lavc-threads=2 --hwdec-extra-frames=1
post_command = __HOME__/.local/bin/caelestia-waypaper-apply --from-waypaper "$wallpaper"
stylesheet = __HOME__/.config/waypaper/style.css
keybindings = ~/.config/waypaper/keybindings.ini
swww_transition_type = none
swww_transition_step = 63
swww_transition_angle = 0
swww_transition_duration = 0
swww_transition_fps = 60
wallpaperengine_folder = ~/.steam/root/steamapps/workshop/content/431960
linux_wallpaperengine_clamp = none
linux_wallpaperengine_volume = 15
linux_wallpaperengine_silent = False
linux_wallpaperengine_noautomute = False
linux_wallpaperengine_no_audio_processing = False
linux_wallpaperengine_fps = 30
linux_wallpaperengine_disable_particles = True
linux_wallpaperengine_disable_mouse = False
linux_wallpaperengine_disable_parallax = False
linux_wallpaperengine_no_fullscreen_pause = False
